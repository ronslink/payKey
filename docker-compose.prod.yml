# Production Docker Compose Configuration for PayKey
# Usage: docker-compose -f docker-compose.prod.yml up -d
# NOTE: DB is a DigitalOcean managed PostgreSQL instance (external, via DATABASE_URL).
#       Redis runs in Docker with password auth.

services:
  redis:
    image: redis:7-alpine
    container_name: paykey_redis_prod
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data_prod:/data
    networks:
      - paykey-network-prod
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: paykey_backend_prod
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    depends_on:
      redis:
        condition: service_healthy
    working_dir: /app
    # No volumes - code is baked into the image
    # No command - use Dockerfile CMD ["node", "dist/src/main"]
    networks:
      - paykey-network-prod
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:3000/api" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  website:
    build:
      context: ./website
      dockerfile: Dockerfile
    container_name: paydome_website_prod
    restart: always
    ports:
      - "8080:80"
    networks:
      - paykey-network-prod
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost" ]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  redis_data_prod:


networks:
  paykey-network-prod:
    driver: bridge
